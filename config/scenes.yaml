safe_scene: safe_neutral

scenes:

  # --- 자동 전략용 베이스 씬 (소형 전시 톤에 맞춤) ---

  - id: calm_gallery

    hold_sec: 120

    target_zone: all

    light:

      brightness: 40

      color_temp: 4200

      transition_ms: 900

    sound:

      track: ambient_calm

      volume: 20

      fade_ms: 900

    display:

      layout_id: gallery_calm

      headline: ""

      subtitle: ""



